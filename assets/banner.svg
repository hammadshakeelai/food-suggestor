<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-label="Pink Plate — AI recipe chat">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff9ec4"/>
      <stop offset="0.55" stop-color="#ef4f8f"/>
      <stop offset="1" stop-color="#ff9e70"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffe4ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sauce" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ef4f8f"/>
      <stop offset="1" stop-color="#ff9e70"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="360" rx="28" fill="url(#bg)"/>
  <circle cx="215" cy="70" r="240" fill="url(#glow)" opacity="0.5"/>
  <circle cx="1120" cy="300" r="220" fill="url(#glow)" opacity="0.35"/>

  <!-- wordmark badge -->
  <g transform="translate(80,96)">
    <rect x="0" y="0" width="72" height="72" rx="20" fill="url(#mark)"/>
    <text x="36" y="50" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="40" font-weight="800" fill="#c91968">P</text>
  </g>

  <!-- headline -->
  <text x="176" y="120" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="3" fill="#fff0f6" opacity="0.9">AI RECIPE CHAT</text>
  <text x="80" y="212" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="78" font-weight="800" fill="#ffffff">Pink Plate</text>
  <text x="82" y="256" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24" font-weight="500" fill="#fff4f9">Tell it what you're craving — get a full recipe and a fresh photo, served hot.</text>

  <!-- feature chips -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#c91968">
    <rect x="80" y="286" width="196" height="42" rx="21" fill="#ffffff" opacity="0.92"/>
    <text x="178" y="313" text-anchor="middle">Instant recipes</text>
    <rect x="288" y="286" width="210" height="42" rx="21" fill="#ffffff" opacity="0.92"/>
    <text x="393" y="313" text-anchor="middle">AI food photos</text>
    <rect x="510" y="286" width="176" height="42" rx="21" fill="#ffffff" opacity="0.92"/>
    <text x="598" y="313" text-anchor="middle">Chat history</text>
  </g>

  <!-- plate illustration -->
  <g transform="translate(1040,180)">
    <ellipse cx="6" cy="118" rx="150" ry="26" fill="#a5164f" opacity="0.25"/>
    <circle cx="0" cy="0" r="132" fill="#ffffff"/>
    <circle cx="0" cy="0" r="132" fill="none" stroke="#ffd6e5" stroke-width="16"/>
    <circle cx="0" cy="0" r="86" fill="#fff6fa"/>
    <ellipse cx="4" cy="10" rx="46" ry="34" fill="url(#sauce)"/>
    <path d="M -44 -30 q 22 -18 44 -2 q -20 6 -44 2 Z" fill="#b7f0d2"/>
    <path d="M 40 -34 q 22 14 6 40 q -14 -18 -6 -40 Z" fill="#b7f0d2"/>
    <!-- steam -->
    <g stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.85">
      <path d="M -18 -104 q 12 -16 0 -32 q -12 -16 0 -32"/>
      <path d="M 20 -108 q 12 -16 0 -32 q -12 -16 0 -30"/>
    </g>
  </g>
</svg>
